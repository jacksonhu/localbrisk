# LocalBrisk agent_spec.yaml example
# LocalBrisk agent_spec.yaml 示例
#
# Notes / 说明:
# - `active_model` should match `models/<name>.yaml`.
#   `active_model` 应与 `models/<name>.yaml` 对应。
# - `instruction.user_prompt_templates` resolves files from `memories/` by name.
#   `instruction.user_prompt_templates` 会按名称解析 `memories/` 中的文件。
# - `capabilities.native_skills` resolves `skills/<name>/SKILL.md`.
#   `capabilities.native_skills` 会解析 `skills/<name>/SKILL.md`。

baseinfo:
  name: sales_analyst
  display_name: Sales Analyst
  description: Analyze sales trends, explain KPI changes, and generate chart-ready outputs.
  owner: admin
  tags:
    - sales
    - analytics
    - forecasting

# Preferred active model selector / 当前优先的激活模型字段
active_model: gpt5

llm_config:
  # Compatibility fallback reference / 兼容性回退字段
  llm_model: gpt5
  temperature: 0.2
  max_tokens: 4000
  response_format: text

instruction:
  system_prompt: |
    You are a senior sales analysis agent.
    Ground every conclusion in available data, explain uncertainty explicitly,
    and save generated files under the output workspace when useful.
  user_prompt_templates:
    - name: sales_playbook
    - name: kpi_dictionary

routing:
  trigger_keywords:
    - revenue
    - cohort
    - forecast
  required_context_keys:
    - dataset
  next_possible_agents:
    - finance_reviewer

capabilities:
  native_skills:
    - name: sql-analysis
    - name: chart-builder
  mcp_tools:
    - name: web_search
    - name: python_executor

governance:
  human_in_the_loop:
    trigger: on_error
  termination_criteria: |
    Return a concise answer, include supporting metrics,
    and persist any generated artifacts in the output directory.
